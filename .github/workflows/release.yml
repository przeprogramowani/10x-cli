name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

permissions:
  contents: read

jobs:
  version:
    # Only run if CI succeeded — skip on failure or if triggered by a non-push event
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.version }}
      should_release: ${{ steps.bump.outputs.should_release }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: "1.3.8"

      - run: bun install --frozen-lockfile

      - name: Bump version
        id: bump
        run: |
          rc=0
          output=$(node scripts/auto-version.mjs 2>&1) || rc=$?
          if [ "$rc" -eq 1 ]; then
            echo "No release needed — skipping."
            echo "$output"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          elif [ "$rc" -ne 0 ]; then
            echo "::error::auto-version.mjs crashed (exit $rc):"
            echo "$output"
            exit 1
          fi
          version=$(echo "$output" | grep '^NEW_VERSION=' | cut -d= -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

      - name: Commit version bump and tag
        if: steps.bump.outputs.should_release == 'true'
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): ${VERSION}"
          git tag -a "${VERSION}" -m "Release ${VERSION}"
          git push origin master "${VERSION}"

  build-binaries:
    needs: [version]
    if: needs.version.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: 10x-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: 10x-linux-arm64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: 10x-darwin-arm64
          - os: macos-14
            target: bun-darwin-x64
            artifact: 10x-darwin-x64
          - os: windows-latest
            target: bun-windows-x64
            artifact: 10x-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ needs.version.outputs.new_version }}
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: "1.3.8"

      - run: bun install --frozen-lockfile

      - name: Build binary
        run: bun build --compile --minify src/index.ts --target ${{ matrix.target }} --outfile dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  publish-npm:
    needs: [version]
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ needs.version.outputs.new_version }}
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: "1.3.8"

      - run: bun install --frozen-lockfile && bun run build

      - name: Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> .npmrc
          npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    needs: [version, build-binaries]
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: release-assets
          merge-multiple: true

      - uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631  # v2
        with:
          tag_name: ${{ needs.version.outputs.new_version }}
          generate_release_notes: true
          files: release-assets/**/*
